services:
  api:
    build:
      context: ./apps/api
    image: referendum-2030-api:latest
    container_name: referendum-2030-api
    restart: unless-stopped
    env_file:
      - /opt/referendum-2030/.env
    command: >
      sh -c "uv run python manage.py migrate &&
             uv run python manage.py collectstatic --noinput &&
             uv run gunicorn referendum2030.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60"
    expose:
      - "8000"
    networks:
      - dokploy-network
    mem_limit: 768m
    cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "/opt/venv/bin/python -c \"import urllib.request; req=urllib.request.Request('http://127.0.0.1:8000/api/v1/healthz/', headers={'X-Forwarded-Proto': 'https', 'Host': 'referendum.yampi.eu'}); urllib.request.urlopen(req, timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.referendum-2030-api-http.rule=Host(`referendum.yampi.eu`)
      - traefik.http.routers.referendum-2030-api-http.entrypoints=web
      - traefik.http.routers.referendum-2030-api-http.middlewares=redirect-to-https@file
      - traefik.http.routers.referendum-2030-api-https.rule=Host(`referendum.yampi.eu`)
      - traefik.http.routers.referendum-2030-api-https.entrypoints=websecure
      - traefik.http.routers.referendum-2030-api-https.tls=true
      - traefik.http.routers.referendum-2030-api-https.tls.certresolver=letsencrypt
      - traefik.http.services.referendum-2030-api.loadbalancer.server.port=8000
      - traefik.http.services.referendum-2030-api.loadbalancer.passhostheader=true

networks:
  dokploy-network:
    external: true
