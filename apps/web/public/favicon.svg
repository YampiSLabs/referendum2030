  <!-- 4 Senyera red stripes on ballot -->
  <rect x="29" y="15" width="6" height="1.5" rx="0.75" fill="#8B1C2B"/>
  <rect x="29" y="18.5" width="6" height="1.5" rx="0.75" fill="#8B1C2B"/>
  <rect x="29" y="22" width="6" height="1.5" rx="0.75" fill="#8B1C2B"/>
  <rect x="29" y="25.5" width="6" height="1.5" rx="0.75" fill="#8B1C2B"/>

  <!-- Checkmark inside box -->
