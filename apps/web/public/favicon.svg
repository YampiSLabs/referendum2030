<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Referèndum 2030">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="12" fill="#8B1C2B"/>

  <!-- Ballot box body -->
  <rect x="12" y="28" width="40" height="26" rx="3" fill="#F7F0DF"/>

  <!-- Ballot slot (top of box) -->
