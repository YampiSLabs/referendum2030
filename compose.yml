services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: referendum2030
      POSTGRES_USER: referendum2030
      POSTGRES_PASSWORD: referendum2030
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U referendum2030 -d referendum2030"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    command: uv run python manage.py runserver 0.0.0.0:8000
    env_file:
      - ./apps/api/.env.example
    environment:
      DJANGO_SETTINGS_MODULE: referendum2030.settings.local
      DATABASE_URL: postgres://referendum2030:referendum2030@db:5432/referendum2030
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      CORS_ALLOWED_ORIGINS: http://localhost:4321,http://127.0.0.1:4321,https://cdryampi.github.io
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./apps/api:/app
    depends_on:
      db:
        condition: service_healthy

  web:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && rm -rf apps/web/node_modules/.vite && pnpm --filter web dev --host 0.0.0.0"
    environment:
      CI: "true"
      PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
      PUBLIC_USE_MOCKS: "false"
    ports:
      - "${WEB_PORT:-4321}:4321"
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - pnpm_store:/root/.local/share/pnpm/store
    depends_on:
      - api

volumes:
  postgres_data:
  pnpm_store:
  node_modules:
  web_node_modules:
